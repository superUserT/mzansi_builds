services:
  # 1. The NestJS Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mzansi_backend
    ports:
      - "3000:3000"
    volumes:
      # Mount local code to the container for hot-reloading
      - ./backend:/usr/src/app
      # Prevent local node_modules from overwriting container node_modules
      - /usr/src/app/node_modules
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres_password
      - DB_NAME=mzansi_builds
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MINIO_ENDPOINT=minio
      - MINIO_PORT=9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
    command: npm run start:dev

  # 2. PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: mzansi_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_password
      POSTGRES_DB: mzansi_builds
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mzansi_builds"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 3. Redis (For BullMQ & Caching)
  redis:
    image: redis:7-alpine
    container_name: mzansi_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # 4. MinIO (For Profile Images / Project Uploads)
  minio:
    image: minio/minio
    container_name: mzansi_minio
    ports:
      - "9000:9000" # API Port
      - "9001:9001" # Console UI Port
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  redis_data:
  minio_data:
